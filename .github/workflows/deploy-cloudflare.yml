name: CI and Deploy Cloudflare

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    env:
      CI: "true"
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL || secrets.SUPABASE_URL || vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}
      WRANGLER_SEND_METRICS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Validate required Vite environment
        shell: pwsh
        run: |
          $missing = @()
          foreach ($name in 'VITE_SUPABASE_URL', 'VITE_SUPABASE_ANON_KEY', 'SUPABASE_URL', 'SUPABASE_ANON_KEY', 'SUPABASE_SERVICE_ROLE_KEY') {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              Write-Host "::error title=Missing required environment variable::$name must be configured as a repository variable or secret."
              $missing += $name
            }
          }

          if ($missing.Count -gt 0) {
            exit 1
          }

      - name: Install dependencies
        shell: pwsh
        run: |
          $attempts = 3
          for ($i = 1; $i -le $attempts; $i++) {
            npm ci
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($i -lt $attempts) {
              Write-Host "npm ci failed on attempt $i/$attempts. Retrying..."
              Start-Sleep -Seconds (5 * $i)
            }
          }

          Write-Host "::error title=npm ci failed::Unable to install dependencies after $attempts attempts."
          exit 1

      - name: Validate Supabase migration gate
        shell: pwsh
        run: |
          $strict = $env:GITHUB_EVENT_NAME -eq 'push' -and $env:GITHUB_REF -eq 'refs/heads/main'
          $missing = @()
          foreach ($name in 'SUPABASE_ACCESS_TOKEN', 'SUPABASE_DB_PASSWORD', 'SUPABASE_PROJECT_REF') {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              Write-Host "::warning title=Supabase migration gate variable not configured::$name should be configured as a repository variable or secret to enforce remote migration drift checks."
              $missing += $name
            }
          }

          if ($missing.Count -gt 0) {
            if ($strict) {
              Write-Host "::error title=Supabase migration gate blocked::Configure SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD and SUPABASE_PROJECT_REF before deploying production."
              exit 1
            }

            Write-Host "::warning title=Supabase migration gate skipped::Configure SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD and SUPABASE_PROJECT_REF to enforce remote migration drift checks in GitHub Actions."
            exit 0
          }

          npx supabase link --project-ref $env:SUPABASE_PROJECT_REF --password $env:SUPABASE_DB_PASSWORD --yes
          if ($LASTEXITCODE -ne 0) {
            if (-not $strict) {
              Write-Host "::warning title=Supabase migration gate skipped::Remote Supabase link failed outside production deploy. Production still blocks on this gate."
              exit 0
            }
            exit $LASTEXITCODE
          }

          if ($strict) {
            npx supabase db push --linked --password $env:SUPABASE_DB_PASSWORD --yes
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

          $migrationOutput = npx supabase migration list --linked 2>&1
          $migrationOutput | ForEach-Object { Write-Host $_ }
          if ($LASTEXITCODE -ne 0) {
            if (-not $strict) {
              Write-Host "::warning title=Supabase migration gate skipped::Remote migration list failed outside production deploy. Production still blocks on this gate."
              exit 0
            }
            exit $LASTEXITCODE
          }

          $drift = @()
          foreach ($line in $migrationOutput) {
            $parts = $line -split '\|'
            if ($parts.Count -lt 2) {
              continue
            }

            $local = $parts[0].Trim()
            $remote = $parts[1].Trim()
            if ($local -notmatch '^\d{14}$' -and $remote -notmatch '^\d{14}$') {
              continue
            }

            if ($local -ne $remote) {
              $drift += $line
            }
          }

          if ($drift.Count -gt 0) {
            if (-not $strict) {
              Write-Host "::warning title=Supabase migrations out of sync::Apply pending migrations before production deploy. PR verification will continue."
              $drift | ForEach-Object { Write-Host $_ }
              exit 0
            }

            Write-Host "::error title=Supabase migrations out of sync::Apply pending migrations manually before deploying Cloudflare."
            $drift | ForEach-Object { Write-Host $_ }
            exit 1
          }

      - name: Run check
        run: npm run check

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

  deploy:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CI: "true"
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL || secrets.SUPABASE_URL || vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      WRANGLER_SEND_METRICS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Validate required environment
        run: |
          missing=0
          for key in VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!key}" ]; then
              echo "::error title=Missing required environment variable::$key must be configured as a repository variable or secret."
              missing=1
            fi
          done

          exit $missing
        shell: bash

      - name: Install dependencies
        shell: bash
        run: |
          attempts=3
          for i in $(seq 1 "$attempts"); do
            if npm ci; then
              exit 0
            fi

            if [ "$i" -lt "$attempts" ]; then
              echo "npm ci failed on attempt $i/$attempts. Retrying..."
              sleep $((i * 5))
            fi
          done

          echo "::error title=npm ci failed::Unable to install dependencies after ${attempts} attempts."
          exit 1

      - name: Sync Worker secrets
        run: |
          printf '%s' "$SUPABASE_URL" | npx wrangler secret put SUPABASE_URL
          printf '%s' "$SUPABASE_ANON_KEY" | npx wrangler secret put SUPABASE_ANON_KEY
          printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY

      - name: Build
        run: npm run build

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run --keep-vars

      - name: Deploy Worker
        run: npx wrangler deploy --keep-vars
