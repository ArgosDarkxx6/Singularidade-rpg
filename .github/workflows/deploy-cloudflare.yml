name: CI and Deploy Cloudflare

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    env:
      CI: "true"
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}
      WRANGLER_SEND_METRICS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Validate required Vite environment
        shell: pwsh
        run: |
          $missing = @()
          foreach ($name in 'VITE_SUPABASE_URL', 'VITE_SUPABASE_ANON_KEY') {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              Write-Host "::error title=Missing required environment variable::$name must be configured as a repository variable or secret."
              $missing += $name
            }
          }

          if ($missing.Count -gt 0) {
            exit 1
          }

      - name: Install dependencies
        run: npm ci

      - name: Validate Supabase migration gate
        shell: pwsh
        run: |
          $missing = @()
          foreach ($name in 'SUPABASE_ACCESS_TOKEN', 'SUPABASE_DB_PASSWORD', 'SUPABASE_PROJECT_REF') {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              Write-Host "::warning title=Supabase migration gate variable not configured::$name should be configured as a repository variable or secret to enforce remote migration drift checks."
              $missing += $name
            }
          }

          if ($missing.Count -gt 0) {
            Write-Host "::warning title=Supabase migration gate skipped::Configure SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD and SUPABASE_PROJECT_REF to enforce remote migration drift checks in GitHub Actions."
            exit 0
          }

          npx supabase link --project-ref $env:SUPABASE_PROJECT_REF --password $env:SUPABASE_DB_PASSWORD --yes
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $migrationOutput = npx supabase migration list --linked 2>&1
          $migrationOutput | ForEach-Object { Write-Host $_ }
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $drift = @()
          foreach ($line in $migrationOutput) {
            $parts = $line -split '\|'
            if ($parts.Count -lt 2) {
              continue
            }

            $local = $parts[0].Trim()
            $remote = $parts[1].Trim()
            if ($local -notmatch '^\d{14}$' -and $remote -notmatch '^\d{14}$') {
              continue
            }

            if ($local -ne $remote) {
              $drift += $line
            }
          }

          if ($drift.Count -gt 0) {
            Write-Host "::error title=Supabase migrations out of sync::Apply pending migrations manually before deploying Cloudflare."
            $drift | ForEach-Object { Write-Host $_ }
            exit 1
          }

      - name: Run check
        run: npm run check

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

  deploy:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CI: "true"
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
      WRANGLER_SEND_METRICS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Validate required environment
        run: |
          missing=0
          for key in VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error title=Missing required environment variable::$key must be configured as a repository variable or secret."
              missing=1
            fi
          done

          exit $missing
        shell: bash

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run

      - name: Confirm Cloudflare-linked deploy
        run: echo "Cloudflare Workers Git integration handles production publication for this repository."
